name: Weekly AI Briefing - Generate & Deploy

on:
  # 每周一 00:00 UTC ≈ 北京时间 08:00（可按需改成周日晚上等）
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly briefing generator
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          python main.py

      - name: Commit generated report if changed
        run: |
          if git status --porcelain | grep -q '^ M\|^??'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add daily_news
            git commit -m "chore: add weekly AI briefing report [skip ci]"
            git push origin master
          else
            echo "No changes in daily_news, nothing to commit."
          fi
